# Конфигурация меню титулов
menu:
  # Заголовок меню
  title: "<gradient:#00C6FF:#0072FF><bold>ТИТУЛЫ</bold></gradient>"
  # Размер инвентаря (кратно 9)
  size: 54

  defaults:
    # Текст, если у титула пустое описание
    no-description: "Описание не задано."

  filler:
    # Материал-заполнитель
    material: "BLACK_STAINED_GLASS_PANE"
    # Имя заполнителя
    name: " "
    # Слоты для заполнителя
    slots: [0,1,2,3,5,6,7,8,45,46,47,48,50,51,52,53]

  info:
    # Слот блока информации игрока
    slot: 4
    # Текст при отсутствии активного титула
    no-active: "<#ff4d4f>Отсутствует</#ff4d4f>"
    # Баланс по умолчанию, если экономику не удалось получить
    balance-fallback: "0"
    # Имя предмета информации
    name: "<gradient:#1dd1a1:#10ac84><bold>Информация</bold></gradient>"
    # Лор предмета информации
    lore:
      - "<#dfe6e9>Ваш баланс: <#00d2d3>{balance}</#00d2d3></#dfe6e9>"
      - "<#dfe6e9>Ваши титулы: <#74b9ff>{owned_total}</#74b9ff></#dfe6e9>"
      - "<#dfe6e9>Активный: {active}</#dfe6e9>"
      - "<#dfe6e9>Срок активного: <#55efc4>{active_expiry}</#55efc4></#dfe6e9>"

  # Слоты карточек титулов
  title-slots: [10,11,12,13,14,15,16,19,20,21,22,23,24,25,28,29,30,31,32,33,34]

  navigation:
    # Кнопка назад
    prev-slot: 45
    # Кнопка вперед
    next-slot: 53
    # Слот индикатора страницы
    page-slot: 49
    # Название кнопки назад
    prev-name: "<#81ecec>Предыдущая страница</#81ecec>"
    # Название кнопки вперед
    next-name: "<#81ecec>Следующая страница</#81ecec>"
    # Название индикатора страницы
    page-name: "<gradient:#a29bfe:#6c5ce7>Страница {page}/{pages}</gradient>"

  cards:
    # Разделительная линия (используйте {line} в lore)
    separator: "<#3a3a3a>──────────────</#3a3a3a>"
    # Настраиваемое имя карточки по состоянию
    # Доступно: {name}, {title_id}, {cost}, {purchase_options}, {owned_expiry}
    name:
      not-owned: "{name}"
      owned-inactive: "{name}"
      owned-active: "{name}"

    # Лор для некупленного титула
    not-owned:
      - "<#b2bec3>{description}</#b2bec3>"
      - "<#55efc4>Цена: <#00cec9>{cost}</#00cec9></#55efc4>"
      - "<#a29bfe>Срок покупки: {purchase_options}</#a29bfe>"
      - " "
      - "<#74b9ff>Нажмите, чтобы купить</#74b9ff>"

    # Лор для купленного, но не активного титула
    owned-inactive:
      - "<#b2bec3>{description}</#b2bec3>"
      - "<#ffeaa7>Срок: <#55efc4>{owned_expiry}</#55efc4></#ffeaa7>"
      - "<#fdcb6e>Статус: <#ff7675>не активирован</#ff7675></#fdcb6e>"
      - " "
      - "<#55efc4>Нажмите, чтобы активировать</#55efc4>"

    # Лор для активного титула
    owned-active:
      - "<#b2bec3>{description}</#b2bec3>"
      - "<#ffeaa7>Срок: <#55efc4>{owned_expiry}</#55efc4></#ffeaa7>"
      - "<#55efc4>Статус: <#00b894>активирован</#00b894></#55efc4>"
      - " "
      - "<#ff7675>Нажмите, чтобы деактивировать</#ff7675>"
