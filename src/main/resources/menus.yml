# Title menu configuration
menu:
  # Menu title
  title: "<gradient:#00C6FF:#0072FF><bold>TITLES</bold></gradient>"
  # Inventory size (must be multiple of 9)
  size: 54

  defaults:
    # Fallback text when title description is empty
    no-description: "Description is not set."

  filler:
    # Filler material
    material: "BLACK_STAINED_GLASS_PANE"
    # Filler item name
    name: " "
    # Filler slots
    slots: [0,1,2,3,5,6,7,8,45,46,47,48,50,51,52,53]

  info:
    # Player info slot
    slot: 4
    # Text shown when player has no active title
    no-active: "<#ff4d4f>None</#ff4d4f>"
    # Balance fallback if no provider is available
    balance-fallback: "0"
    # Player info item name
    name: "<gradient:#1dd1a1:#10ac84><bold>Information</bold></gradient>"
    # Player info item lore
    lore:
      - "<#dfe6e9>Your balance: <#00d2d3>{balance}</#00d2d3></#dfe6e9>"
      - "<#dfe6e9>Your titles: <#74b9ff>{owned_total}</#74b9ff></#dfe6e9>"
      - "<#dfe6e9>Active: {active}</#dfe6e9>"
      - "<#dfe6e9>Active expiry: <#55efc4>{active_expiry}</#55efc4></#dfe6e9>"

  # Slots used for title cards
  title-slots: [10,11,12,13,14,15,16,19,20,21,22,23,24,25,28,29,30,31,32,33,34]

  navigation:
    # Previous page button slot
    prev-slot: 45
    # Next page button slot
    next-slot: 53
    # Page indicator slot
    page-slot: 49
    # Previous button name
    prev-name: "<#81ecec>Previous page</#81ecec>"
    # Next button name
    next-name: "<#81ecec>Next page</#81ecec>"
    # Page indicator text
    page-name: "<gradient:#a29bfe:#6c5ce7>Page {page}/{pages}</gradient>"

  cards:
    # Divider line (use {line} in lore)
    separator: "<#3a3a3a>--------------</#3a3a3a>"
    # Configurable card name by state
    # Available: {name}, {title_id}, {cost}, {purchase_options}, {owned_expiry}
    name:
      not-owned: "{name}"
      owned-inactive: "{name}"
      owned-active: "{name}"

    # Lore for not owned title
    not-owned:
      - "<#b2bec3>{description}</#b2bec3>"
      - "<#55efc4>Price: <#00cec9>{cost}</#00cec9></#55efc4>"
      - "<#a29bfe>Purchase options: {purchase_options}</#a29bfe>"
      - " "
      - "<#74b9ff>Click to buy</#74b9ff>"

    # Lore for owned but inactive title
    owned-inactive:
      - "<#b2bec3>{description}</#b2bec3>"
      - "<#ffeaa7>Expiry: <#55efc4>{owned_expiry}</#55efc4></#ffeaa7>"
      - "<#fdcb6e>Status: <#ff7675>inactive</#ff7675></#fdcb6e>"
      - " "
      - "<#55efc4>Click to activate</#55efc4>"

    # Lore for owned and active title
    owned-active:
      - "<#b2bec3>{description}</#b2bec3>"
      - "<#ffeaa7>Expiry: <#55efc4>{owned_expiry}</#55efc4></#ffeaa7>"
      - "<#55efc4>Status: <#00b894>active</#00b894></#55efc4>"
      - " "
      - "<#ff7675>Click to deactivate</#ff7675>"
