# ===================== PLACEHOLDERS IN MESSAGES =====================
# Common:
# {player}           - player name
# {title}            - title display name (display-name)
# {id}               - internal title id (for example warrior)
# {display}          - title display-name
# {raw}              - title raw format string
# {reason}           - purchase/grant error reason
# {duration}         - readable duration (for example: 7d. 3h. 20min. / forever)
# {expire_at}        - expire date/time for temporary ownership (format from expire-time-format)
# {cost}             - title cost
# {purchase_options} - available purchase options string
# {titles}           - title list in /extracttitles list
# {loaded}           - number of loaded titles (debug)
# {owned}            - number of owned titles for player (debug)
# {active}           - active title for player (debug)
#
# Menu placeholders (menus.yml info/card lines):
# {balance}, {owned_total}, {active_expiry}, {owned_expiry}, {description}
#
# PlaceholderAPI examples:
# %player_name%
# %vault_eco_balance_formatted%
# %playerpoints_points%
# %extracttitles_active_title%
# %extracttitles_active_title_name%
# %extracttitles_active_title_raw%
# %extracttitles_owned_count%
# %extracttitles_total_count%
# %extracttitles_active_title_or_none%
# %extracttitles_has_title_<id>%
# %extracttitles_title_expiry_<id>%
# %extracttitles_title_remaining_<id>%
# ====================================================================
messages:
  no-permission: "<#ff6b6b>You do not have permission.</#ff6b6b>"
  only-player: "<#ff6b6b>This command can only be used by a player.</#ff6b6b>"
  reload: "<#55efc4>ExtractTitles reloaded.</#55efc4>"
  list: "<#74b9ff>Titles:</#74b9ff> <#dfe6e9>{titles}</#dfe6e9>"
  no-titles: "no available titles"
  none-word: "none"
  duration-forever: "forever"
  duration-day-short: "d."
  duration-hour-short: "h."
  duration-minute-short: "min."
  duration-second-short: "sec."
  expire-time-format: "dd.MM.yyyy HH:mm"

  title-not-found: "<#ff6b6b>Title <white>{title}</white> was not found.</#ff6b6b>"
  activated: "<#55efc4>Title <white>{title}</white> activated.</#55efc4>"
  already-activated: "<#fdcb6e>Title <white>{title}</white> is already active.</#fdcb6e>"
  activate-failed: "<#ff6b6b>Failed to activate <white>{title}</white>.</#ff6b6b>"
  deactivated: "<#fdcb6e>Title <white>{title}</white> deactivated.</#fdcb6e>"
  already-deactivated: "<#fdcb6e>Active title is already disabled.</#fdcb6e>"

  buy-success: "<#55efc4>You bought title <white>{title}</white>. Duration: <white>{duration}</white>.</#55efc4>"
  buy-failed: "<#ff6b6b>Purchase failed: <white>{reason}</white>.</#ff6b6b>"

  give-success: "<#55efc4>Granted title <white>{title}</white> to <white>{player}</white>.</#55efc4>"
  give-failed: "<#ff6b6b>Grant failed: <white>{reason}</white>.</#ff6b6b>"
  remove-success: "<#fdcb6e>Removed title <white>{title}</white> from <white>{player}</white>.</#fdcb6e>"
  granttemp-success: "<#55efc4>Granted temporary title <white>{title}</white> to <white>{player}</white> for <white>{duration}</white> (until <white>{expire_at}</white>).</#55efc4>"
  clearactive-success: "<#fdcb6e>Cleared active title for <white>{player}</white>.</#fdcb6e>"

  debug: "<#b2bec3>DEBUG: loaded <white>{loaded}</white> titles.</#b2bec3>"
  debug-player: "<#b2bec3>DEBUG <white>{player}</white>: owned=<white>{owned}</white>, active=<white>{active}</white>.</#b2bec3>"

  player-not-found: "<#ff6b6b>Player <white>{player}</white> was not found.</#ff6b6b>"
  invalid-duration: "<#ff6b6b>Invalid duration: <white>{duration}</white>. Example: 1h, 7d, 30d.</#ff6b6b>"

  usage-activate: "<#fdcb6e>Usage: /extracttitles activate <id></#fdcb6e>"
  usage-buy: "<#fdcb6e>Usage: /extracttitles buy <id></#fdcb6e>"
  usage-info: "<#fdcb6e>Usage: /extracttitles info <id></#fdcb6e>"
  usage-give: "<#fdcb6e>Usage: /extracttitles give <player> <id></#fdcb6e>"
  usage-remove: "<#fdcb6e>Usage: /extracttitles remove <player> <id></#fdcb6e>"
  usage-granttemp: "<#fdcb6e>Usage: /extracttitles granttemp <player> <id> <1d></#fdcb6e>"
  usage-clearactive: "<#fdcb6e>Usage: /extracttitles clearactive <player></#fdcb6e>"

  help-user:
    - "<gradient:#00c6ff:#0072ff><bold>ExtractTitles - Player Commands</bold></gradient>"
    - "<#8be9fd>/titles</#8be9fd> <gray>- open titles menu</gray>"
    - "<#8be9fd>/extracttitles buy <id></#8be9fd> <gray>- buy a title</gray>"
    - "<#8be9fd>/extracttitles info <id></#8be9fd> <gray>- show title info</gray>"
    - "<#8be9fd>/extracttitles activate <id></#8be9fd> <gray>- activate title</gray>"
    - "<#8be9fd>/extracttitles deactivate</#8be9fd> <gray>- deactivate title</gray>"

  help-admin:
    - "<gradient:#00c6ff:#0072ff><bold>ExtractTitles - Admin Commands</bold></gradient>"
    - "<#8be9fd>/extracttitles list</#8be9fd> <gray>- list titles</gray>"
    - "<#8be9fd>/extracttitles reload</#8be9fd> <gray>- reload plugin</gray>"
    - "<#8be9fd>/extracttitles give <player> <id></#8be9fd> <gray>- grant permanent title</gray>"
    - "<#8be9fd>/extracttitles remove <player> <id></#8be9fd> <gray>- remove title from player</gray>"
    - "<#8be9fd>/extracttitles granttemp <player> <id> <1d></#8be9fd> <gray>- grant temporary title</gray>"
    - "<#8be9fd>/extracttitles clearactive <player></#8be9fd> <gray>- clear active title</gray>"
    - "<#8be9fd>/extracttitles debug [player]</#8be9fd> <gray>- debug title data</gray>"

  info: |
    <gradient:#00c6ff:#0072ff><bold>Title Info: {id}</bold></gradient>
    <#dfe6e9>Name:</#dfe6e9> <white>{display}</white>
    <#dfe6e9>Description:</#dfe6e9> <white>{raw}</white>
    <#dfe6e9>Cost:</#dfe6e9> <white>{cost}</white>
    <#dfe6e9>Purchase options:</#dfe6e9> <white>{purchase_options}</white>

  reason-title-not-found: "title not found"
  reason-disabled: "title disabled"
  reason-no-permission: "no permission"
  reason-requirement-not-met: "requirements not met"
  reason-already-owned: "title already owned"
  reason-provider-unavailable: "economy provider unavailable"
  reason-not-enough-funds: "not enough funds"
  reason-invalid-duration: "invalid duration option"
  reason-error: "internal error"
  reason-unknown: "unknown error"
