# ===================== ПЛЕЙСХОЛДЕРЫ В СООБЩЕНИЯХ =====================
# Общие:
# {player}           - имя игрока
# {title}            - красивое название титула (display-name)
# {id}               - внутренний ID титула (например warrior)
# {display}          - display-name титула
# {raw}              - описание/сырой текст (зависит от сообщения)
# {reason}           - причина ошибки покупки/выдачи
# {duration}         - длительность (например: 7д. 3ч. 20мин. / навсегда)
# {expire_at}        - дата истечения во временной выдаче (формат из expire-time-format)
# {cost}             - стоимость титула
# {purchase_options} - строка режима покупки (навсегда / 30d / 7d и т.д.)
# {titles}           - список титулов в команде list
# {loaded}           - кол-во загруженных титулов (debug)
# {owned}            - кол-во купленных титулов игрока (debug)
# {active}           - активный титул игрока (debug)
#
# Для админ-сообщений:
# {player}           - целевой игрок
# {title}            - титул
#
# Для меню (menus.yml, info.lore / cards):
# {balance}          - баланс игрока
# {owned_total}      - куплено/всего (например 2/5)
# {active_expiry}    - срок активного титула
# {owned_expiry}     - срок конкретного купленного титула
# {description}      - описание титула
#
# PlaceholderAPI (если установлен PAPI):
# Можно использовать любые внешние %placeholder% прямо в сообщениях.
# Примеры:
# %player_name%
# %vault_eco_balance_formatted%
# %playerpoints_points%
# %extracttitles_active_title%
# %extracttitles_active_title_name%
# %extracttitles_active_title_raw%
# %extracttitles_owned_count%
# %extracttitles_total_count%
# %extracttitles_active_title_or_none%
# %extracttitles_has_title_<id>%
# %extracttitles_title_expiry_<id>%
# %extracttitles_title_remaining_<id>%
# =====================================================================
