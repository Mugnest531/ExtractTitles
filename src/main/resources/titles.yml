# Титулы настраиваются только здесь.
# Для каждого титула:
# - permanent.enabled=true  -> покупка навсегда
# - permanent.enabled=false + один ключ в temporary -> покупка на время
#
# Можно подключать шаблоны эффектов из effects.yml:
# effects:
#   - template: warrior_core
#   - template: speed_alchemist

titles:
  warrior:
    display-name: "<gradient:#ff9f43:#ee5253><bold>Воин</bold></gradient>"
    raw: "<#ff9f43>[Воин]</#ff9f43>"
    visible: "<#ff9f43>[Воин]</#ff9f43>"
    description: "Бонус к максимальному здоровью."
    icon: NETHERITE_SWORD
    menu-icons:
      not-owned:
        material: BARRIER
        glow: false
      owned-inactive:
        material: NETHERITE_SWORD
        glow: false
      owned-active:
        material: NETHERITE_SWORD
        glow: true
    enabled: true
    purchase-options:
      permanent:
        enabled: true
        cost: 450
      temporary: {}
    effects:
      - template: warrior_core

  alchemist:
    display-name: "<gradient:#a29bfe:#6c5ce7><bold>Алхимик</bold></gradient>"
    raw: "<#a29bfe>[Алхимик]</#a29bfe>"
    visible: "<#a29bfe>[Алхимик]</#a29bfe>"
    description: "Скорость при активном титуле."
    icon: BREWING_STAND
    menu-icons:
      not-owned:
        material: BARRIER
        glow: false
      owned-inactive:
        material: BREWING_STAND
        glow: false
      owned-active:
        material: BREWING_STAND
        glow: true
    enabled: true
    purchase-options:
      permanent:
        enabled: false
        cost: 0
      temporary:
        30d: 250
    effects:
      - template: speed_alchemist

  miner:
    display-name: "<gradient:#00d2d3:#54a0ff><bold>Шахтёр</bold></gradient>"
    raw: "<#00d2d3>[Шахтёр]</#00d2d3>"
    visible: "<#00d2d3>[Шахтёр]</#00d2d3>"
    description: "Добыча 3x3, пока титул активен."
    icon: DIAMOND_PICKAXE
    menu-icons:
      not-owned:
        material: BARRIER
        glow: false
      owned-inactive:
        material: DIAMOND_PICKAXE
        glow: false
      owned-active:
        material: DIAMOND_PICKAXE
        glow: true
    enabled: true
    purchase-options:
      permanent:
        enabled: true
        cost: 600
      temporary: {}
    effects:
      - template: miner_core

  guardian:
    display-name: "<gradient:#00f5d4:#00bbf9><bold>Страж</bold></gradient>"
    raw: "<#00bbf9>[Страж]</#00bbf9>"
    visible: "<#00bbf9>[Страж]</#00bbf9>"
    description: "Выдает права, пока титул активен."
    icon: SHIELD
    menu-icons:
      not-owned:
        material: BARRIER
        glow: false
      owned-inactive:
        material: SHIELD
        glow: false
      owned-active:
        material: SHIELD
        glow: true
    enabled: true
    purchase-options:
      permanent:
        enabled: true
        cost: 700
      temporary: {}
    effects:
      - template: guardian_permissions

  herald:
    display-name: "<gradient:#ffd166:#f78c6b><bold>Глашатай</bold></gradient>"
    raw: "<#f78c6b>[Глашатай]</#f78c6b>"
    visible: "<#f78c6b>[Глашатай]</#f78c6b>"
    description: "Запускает команды при активации/деактивации."
    icon: BELL
    menu-icons:
      not-owned:
        material: BARRIER
        glow: false
      owned-inactive:
        material: BELL
        glow: false
      owned-active:
        material: BELL
        glow: true
    enabled: true
    purchase-options:
      permanent:
        enabled: false
        cost: 0
      temporary:
        7d: 120
    effects:
      - type: command
        on-activate:
          - "console:say {player} активировал титул {title_id}"
        on-deactivate:
          - "console:say {player} деактивировал титул {title_id}"